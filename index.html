<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mon Journal</title>
  <meta name="description" content="Journal intime personnel sécurisé">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mon Journal">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<!-- LOCK SCREEN -->
<div id="lock-screen" class="screen active">
  <div class="lock-container">
    <div class="lock-icon">🔒</div>
    <h1>Mon Journal</h1>
    <p class="lock-subtitle" id="lock-subtitle">Entrez votre code PIN</p>
    <div class="pin-dots" id="pin-dots">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="numpad">
      <button class="num-btn" data-num="1">1</button>
      <button class="num-btn" data-num="2">2</button>
      <button class="num-btn" data-num="3">3</button>
      <button class="num-btn" data-num="4">4</button>
      <button class="num-btn" data-num="5">5</button>
      <button class="num-btn" data-num="6">6</button>
      <button class="num-btn" data-num="7">7</button>
      <button class="num-btn" data-num="8">8</button>
      <button class="num-btn" data-num="9">9</button>
      <button class="num-btn empty"></button>
      <button class="num-btn" data-num="0">0</button>
      <button class="num-btn del-btn" id="del-btn">⌫</button>
    </div>
    <p class="first-time-hint" id="first-time-hint" style="display:none">Créez un code PIN à 4 chiffres pour sécuriser votre journal</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-screen" class="screen">

  <!-- TOP NAV -->
  <nav class="top-nav">
    <button class="nav-btn" id="btn-search-toggle" aria-label="Rechercher">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <h2 class="nav-title">Mon Journal</h2>
    <div class="nav-actions">
      <button class="nav-btn" id="btn-theme" aria-label="Changer le thème">
        <svg id="icon-moon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="icon-sun" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="nav-btn" id="btn-export-all" aria-label="Exporter toutes les notes">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="nav-btn" id="btn-lock" aria-label="Verrouiller">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </button>
    </div>
  </nav>

  <!-- SEARCH BAR -->
  <div id="search-bar" class="search-bar hidden">
    <input type="text" id="search-input" placeholder="Rechercher dans le journal…" autocomplete="off">
    <button id="btn-search-close">✕</button>
  </div>

  <!-- ENTRIES LIST -->
  <div id="list-view" class="view active">
    <div id="entries-container"></div>
    <div id="empty-state" class="empty-state hidden">
      <span class="empty-icon">📖</span>
      <p>Aucune entrée pour l'instant</p>
      <small>Appuyez sur + pour écrire</small>
    </div>
    <div id="no-results" class="empty-state hidden">
      <span class="empty-icon">🔍</span>
      <p>Aucun résultat</p>
    </div>
  </div>

  <!-- WRITE / EDIT VIEW -->
  <div id="edit-view" class="view">
    <div class="edit-header">
      <button class="back-btn" id="btn-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Retour
      </button>
      <div class="edit-actions">
        <button class="icon-btn export-btn" id="btn-export-one" style="display:none" aria-label="Exporter cette note">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="icon-btn danger" id="btn-delete" style="display:none" aria-label="Supprimer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
        <button class="save-btn" id="btn-save">Enregistrer</button>
      </div>
    </div>
    <div class="edit-meta">
      <input type="text" id="entry-title" class="title-input" placeholder="Titre (optionnel)" maxlength="80">
      <div class="date-display" id="date-display"></div>
    </div>
    <textarea id="entry-content" class="content-input" placeholder="Écrivez vos pensées…"></textarea>
  </div>

  <!-- FAB -->
  <button class="fab" id="btn-new" aria-label="Nouvelle entrée">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

</div>

<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js")}</script>
<script src="app.js"></script>
</body>
</html>
